<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ro' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow, max-image-preview:large">

  <!-- Title, description, canonical, Open Graph, Twitter cards, JSON-LD org -->
  {% seo %}

  <!-- Geo / local SEO signals -->
  <meta name="geo.region" content="{{ site.geo.country }}-{{ site.geo.region }}">
  <meta name="geo.placename" content="{{ site.geo.locality }}">
  <meta name="geo.position" content="{{ site.geo.latitude }};{{ site.geo.longitude }}">
  <meta name="ICBM" content="{{ site.geo.latitude }}, {{ site.geo.longitude }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/favicon.png' | relative_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <div class="fab-group">
    <a href="https://wa.me/{{ site.contact.phone_href | remove: '+' }}?text=Bun%C4%83%20ziua%2C%20a%C8%99%20dori%20o%20consulta%C8%9Bie%20privind%20desp%C4%83gubirile%20dintr-un%20accident%20auto."
       class="fab fab-whatsapp" target="_blank" rel="noopener" aria-label="Scrieți-ne pe WhatsApp">
      <svg viewBox="0 0 32 32" width="28" height="28" fill="currentColor" aria-hidden="true"><path d="M16 3C9.4 3 4 8.4 4 15c0 2.1.6 4.2 1.6 6L4 29l8.2-1.6c1.7.9 3.6 1.4 5.6 1.4h.2c6.6 0 12-5.4 12-12S22.6 3 16 3zm0 21.8c-1.7 0-3.4-.5-4.9-1.3l-.4-.2-4.9 1 1-4.7-.3-.5C5.6 18.4 5 16.7 5 15 5 9 9.9 4.2 16 4.2S27 9 27 15 22.1 24.8 16 24.8zm6-8.2c-.3-.2-2-1-2.3-1.1-.3-.1-.5-.2-.8.2s-.9 1.1-1.1 1.3c-.2.2-.4.2-.7.1-1.8-.9-3-1.6-4.2-3.6-.3-.5.3-.5.9-1.6.1-.2 0-.4 0-.6s-.8-1.9-1-2.6c-.3-.7-.5-.6-.8-.6h-.6c-.2 0-.6.1-.9.4-.3.4-1.2 1.2-1.2 2.9s1.2 3.3 1.4 3.6c.2.2 2.5 3.9 6.1 5.3 2.3.9 3.2 1 4.3.8.7-.1 2-.8 2.3-1.6.3-.8.3-1.4.2-1.6-.1-.1-.3-.2-.6-.4z"/></svg>
    </a>
    <a href="tel:{{ site.contact.phone_href }}" class="fab fab-call" aria-label="Sunați acum">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg>
    </a>
    <a href="#top" class="fab fab-top" aria-label="Înapoi sus">↑</a>
  </div>

  <!-- Sticky mobile call bar -->
  <a href="tel:{{ site.contact.phone_href }}" class="mobile-callbar">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg>
    Sunați acum: {{ site.contact.phone }}
  </a>

  {% include structured-data.html %}
</body>
</html>
